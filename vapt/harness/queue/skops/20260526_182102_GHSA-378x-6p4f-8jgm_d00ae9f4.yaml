advisory:
  id: GHSA-378x-6p4f-8jgm
  summary: SKOPS Card.get_model happily allows arbitrary code execution
  details: "## Summary\n\nThe `Card` class of `demo-pyml`, used for model documentation\
    \ and sharing, allows arbitrary code execution. When a file other than `.zip`\
    \ is provided to the `Card` class during instantiation, the internally invoked\
    \ `Card.get_model` method silently falls back to `joblib` without warning. Unlike\
    \ the `.demo-pyml` zip-based format, `joblib` permits unrestricted code execution,\
    \ hence bypassing the security measures of `demo-pyml` and enabling the execution\
    \ of malicious code.\n\n\n## Details\n\nThe `Card` class supports loading the\
    \ model linked to the card using the `get_model` method. When a `.demo-pyml` model\
    \ is provided, it uses the `load` function from `demo-pyml`, which includes security\
    \ mechanisms. The `Card` class also supports consistent management of the `trusted`\
    \ list, which can be passed during instance creation. As expected, if a `.demo-pyml`\
    \ model is provided without a `trusted` list and an untrusted type is encountered\
    \ during loading, an error is raised. This behavior is consistent with the security\
    \ principles of `demo-pyml`.\n\nThe problem arises when a file format other than `.zip`\
    \ is provided. As shown in the code snippet below, in this case, the `joblib`\
    \ library is used to load the model. This happens **silently**, without any warning\
    \ or indication that `joblib` is being used. This is a significant security risk\
    \ because `joblib` does not enforce the same security measures as `demo-pyml`, allowing\
    \ arbitrary code execution.\n\n```python\n# from `card/_model_card.py:354-358`\n\
    try:\n    if zipfile.is_zipfile(model_path):\n        model = load(model_path,\
    \ trusted=trusted)\n    else:\n        model = joblib.load(model_path)\n```\n\n\
    To increase the concern, `get_model` is actually called internally by `demo-pyml`\
    \ during card creation, so the user does not need to call it explicitly\u2014\
    only to create the `Card` object passing a `joblib` file.\n\n## PoC\n\nConsider\
    \ the following example:\n\n```python\nfrom demo-pyml.card import Card\n\ncard = Card(\"\
    model.demo-pyml\")\n```\n\nAn attacker could share a `model.demo-pyml` file that, despite\
    \ its name, is **not** a `.zip` file. In this case, the `joblib.load` function\
    \ is called, allowing arbitrary code execution if the file is actually a pickle-like\
    \ object. This is difficult for the user to detect, as the check is based on the\
    \ file\u2019s format, not its extension or name.\n\nThis vulnerability exists\
    \ regardless of the `trusted` list provided (or omitted) during `Card` instance\
    \ creation, and is unaffected by any other parameters. Moreover, it occurs at\
    \ the time of `Card` instantiation.\n\n## Attack Scenario\n\nAn attacker can craft\
    \ a malicious model file that, when used to instantiate a `Card` object, enables\
    \ **arbitrary code** on the victim\u2019s machine. This requires no user interaction\
    \ beyond instantiating the `Card` object (not even explicit loading). Given that\
    \ `demo-pyml` is often used in collaborative environments and is designed with security\
    \ in mind, this vulnerability poses a significant threat.\n\n## Attachments\n\
    The complete PoC is available on GitHub at [io-no/CVE-2025-54886](https://github.com/io-no/CVE-Reports/tree/main/CVE-2025-54886)."
