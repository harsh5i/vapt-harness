name: CI

# Cross-platform validation for the VAPT harness. The atomic_io abstraction
# routes file locking through fcntl on Unix/macOS and msvcrt.locking on
# Windows; this matrix exercises both branches against the unit-test suite.
# Real-target tests under tests/test_realworld_smoke.py are explicitly opt-in
# (`VAPT_REALWORLD=1`) and stay off this default workflow so CI does not depend
# on network availability of upstream OSS repos.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install runtime + dev requirements
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML

      - name: Run unit test suite
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -m pytest vapt/harness/tests/ -q --tb=short

      - name: Import-surface smoke check
        # Catches platform-conditional import regressions in atomic_io and
        # the tools/runtime helpers that aren't covered by the pytest suite.
        run: |
          python -c "import sys; sys.path.insert(0, 'vapt/harness'); import atomic_io, source.ast_python; print('imports ok')"
